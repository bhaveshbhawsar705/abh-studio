kind = "web"
previewPath = "/"
title = "ABH STUDIO"
version = "1.0.0"
id = "artifacts/abh-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21544

[services.development]
run = "pnpm --filter @workspace/abh-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/abh-studio", "run", "build" ]
publicDir = "artifacts/abh-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21544"
BASE_PATH = "/"
